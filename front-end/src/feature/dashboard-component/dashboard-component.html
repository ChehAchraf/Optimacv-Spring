<div class="min-h-screen bg-base-200">
  <app-side-bar-component
    [isOpen]="sidebarOpen()"
    (close)="onSidebarClose()"
  />

  <app-topbar-component (menuClick)="onMenuClick()" />

  <!-- Main content: offset by sidebar width on desktop -->
  <main
    class="min-h-[calc(100vh-4rem)] p-4 sm:p-6 lg:pl-64"
    role="main"
  >
    <router-outlet />
  </main>
</div>
