<section class="rounded-2xl bg-base-100 p-6 shadow-sm">
  <div class="mb-4 flex items-start justify-between gap-3">
    <div class="flex items-center gap-3">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary/10 text-primary"
      >
        <i-lucide [img]="UploadIcon" class="h-5 w-5"></i-lucide>
      </div>
      <div>
        <h2 class="text-sm font-semibold text-base-content">
          Upload a new CV
        </h2>
        <p class="mt-1 text-xs text-base-content/60">
          Drag and drop a PDF or choose a file from your device. OptimaCV will
          keep your recent resumes here.
        </p>
      </div>
    </div>
  </div>

  <label
    class="mt-2 flex cursor-pointer flex-col items-center justify-center rounded-2xl border border-dashed border-base-300 bg-base-200/60 px-4 py-10 text-center transition-colors hover:border-primary/60 hover:bg-base-200"
  >
    <div
      class="mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-base-100 text-primary shadow-sm"
    >
      <i-lucide [img]="UploadIcon" class="h-6 w-6"></i-lucide>
    </div>
    <p class="text-sm font-medium text-base-content">
      Drop your CV here, or click to browse
    </p>
    <p class="mt-1 text-xs text-base-content/60">
      PDF files only. Up to 5 MB per document.
    </p>
    <input type="file" class="hidden" />
  </label>

  <div class="mt-4 flex flex-wrap gap-2 text-[11px] text-base-content/50">
    <span class="badge badge-outline badge-xs">ATS-friendly scoring</span>
    <span class="badge badge-outline badge-xs">Skill gap insights</span>
    <span class="badge badge-outline badge-xs">Role-based alignment</span>
  </div>
</section>
