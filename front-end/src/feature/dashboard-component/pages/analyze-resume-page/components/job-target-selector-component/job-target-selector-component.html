<section class="rounded-2xl bg-base-100 p-6 shadow-sm h-full flex flex-col">
  <div class="mb-4 flex items-start gap-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-secondary/10 text-secondary"
    >
      <i-lucide [img]="TargetIcon" class="h-5 w-5"></i-lucide>
    </div>
    <div>
      <h2 class="text-sm font-semibold text-base-content">
        Select Job Target
      </h2>
      <p class="mt-1 text-xs text-base-content/60">
        Choose the role you want to match this CV against.
      </p>
    </div>
  </div>

  <!-- Search bar -->
  <div class="mb-4">
    <label class="input input-bordered flex items-center gap-2 rounded-xl text-sm">
      <span class="text-base-content/60 text-xs">Search targets</span>
      <input
        type="text"
        class="grow text-sm bg-transparent outline-none"
        placeholder="e.g. Frontend, Designer, Remote..."
        (input)="onSearch($event)"
        [value]="jobStore.searchQuery()"
      />
    </label>
  </div>

  <!-- Scrollable list of job cards -->
  <div class="flex-1 overflow-y-auto rounded-2xl border border-base-200 bg-base-100 p-2">
    <div class="space-y-2">
      <!-- Card 1 (checked by default) -->
      @for (job of jobs(); track job.id){
        <label
          class="label cursor-pointer flex items-start gap-4 rounded-xl border border-base-200 bg-base-100 p-4 text-sm shadow-sm hover:bg-base-200/70 transition-colors"
        >
          <input
            (click)="onJobClick(job.id)"
            type="radio"
            name="selected_job"
            class="radio radio-primary mt-1"
          />
          <div class="flex items-start gap-3 flex-1 min-w-0">
            <div
              class="flex h-9 w-9 items-center justify-center rounded-xl bg-primary/10 text-primary shrink-0"
            >
              <i-lucide [img]="BriefcaseIcon" class="h-4 w-4"></i-lucide>
            </div>
            <div class="min-w-0">
              <p class="truncate font-semibold">
                {{job.title}}
              </p>
              <div class="mt-2 flex flex-wrap gap-2 text-[11px] text-base-content/60">
                <span class="badge badge-outline badge-xs">Angular</span>
                <span class="badge badge-outline badge-xs">Design systems</span>
                <span class="badge badge-outline badge-xs">5+ years</span>
              </div>
            </div>
          </div>
        </label>
      }
    </div>
  </div>

  <!-- Pagination UI -->
  <div class="mt-4 flex items-center justify-center">
    <div class="join">
      <button type="button" class="btn btn-sm join-item" aria-label="Previous page"
              [disabled]="currentPage() === 1"
              (click)="onPageChange(currentPage() - 1)">
        «
      </button>
      <button type="button" class="btn btn-sm join-item btn-active">
        Page {{ currentPage() }} of {{ totalPages() || 1 }}
      </button>
      <button type="button" class="btn btn-sm join-item" aria-label="Next page"
              [disabled]="currentPage() === totalPages() || totalPages() === 0"
              (click)="onPageChange(currentPage() + 1)">
        »
      </button>
    </div>
  </div>
</section>
