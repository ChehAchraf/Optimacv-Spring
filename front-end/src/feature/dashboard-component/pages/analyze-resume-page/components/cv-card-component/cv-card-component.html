<article
  class="card h-full rounded-2xl border border-base-200 bg-base-100 shadow-sm transition-all hover:-translate-y-0.5 hover:shadow-md"
>
  <div class="card-body gap-3">
    <div class="flex items-center gap-3">
      <div
        class="flex h-9 w-9 items-center justify-center rounded-xl bg-base-200 text-primary"
      >
        <i-lucide [img]="FileTextIcon" class="h-5 w-5"></i-lucide>
      </div>
      <div class="min-w-0">
        <p class="truncate text-sm font-semibold">
          Frontend_Dev_Resume.pdf
        </p>
        <p class="text-[11px] uppercase tracking-wide text-base-content/50">
          Primary CV
        </p>
      </div>
    </div>

    <div class="mt-2 flex items-center gap-2 text-xs text-base-content/60">
      <i-lucide [img]="ClockIcon" class="h-4 w-4"></i-lucide>
      <span>Uploaded on Mar 10, 2026</span>
    </div>

    <div class="mt-3 flex flex-wrap gap-2 text-[11px] text-base-content/60">
      <span class="badge badge-outline badge-xs">Frontend</span>
      <span class="badge badge-outline badge-xs">Angular</span>
      <span class="badge badge-outline badge-xs">3+ years</span>
    </div>

    <div class="mt-4 flex justify-between gap-3 text-xs text-base-content/60">
      <span>Ready for analysis</span>
      <span class="badge badge-soft badge-success">Recommended</span>
    </div>

    <div class="mt-4">
      <button
        type="button"
        class="btn btn-primary btn-sm w-full rounded-full"
      >
        Analyze this CV
      </button>
    </div>
  </div>
</article>
