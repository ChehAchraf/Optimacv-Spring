<section class="rounded-3xl bg-base-100 p-5 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0 space-y-1">
      <h2 class="text-sm font-semibold tracking-tight">Match Score</h2>
      <p class="text-xs text-base-content/60">
        How closely the resume aligns with the job target keywords.
      </p>
    </div>

    <div class="flex flex-col items-end gap-2">
      @if (score() >= 80) {
        <span class="badge badge-success badge-sm rounded-full px-3 text-base-100/95">
          {{ score() }}%
        </span>
      } @else if (score() >= 60) {
        <span class="badge badge-warning badge-sm rounded-full px-3">
          {{ score() }}%
        </span>
      } @else {
        <span class="badge badge-error badge-sm rounded-full px-3 text-base-100/95">
          {{ score() }}%
        </span>
      }

      <div class="flex items-center gap-2 text-xs text-base-content/60">
        <i-lucide [img]="SparklesIcon" class="h-4 w-4 text-primary"></i-lucide>
        <span>Recommendation strength</span>
      </div>
    </div>
  </div>

  <div class="divider my-4"></div>

  <div class="space-y-2">
    <h3 class="text-sm font-semibold tracking-tight">Verdict</h3>
    <p class="text-sm leading-relaxed text-base-content/80">
      {{ verdict() }}
    </p>
  </div>
</section>
